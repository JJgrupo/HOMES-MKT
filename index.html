<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador PRO Contenido Viral Inmobiliario</title>
<style>
body{font-family:sans-serif;background:#f5f4f0;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;border:1px solid #ddd}
button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer;margin:5px}
.primary{background:#000;color:#fff}
.secondary{background:#eee}
.tag{padding:6px 10px;border-radius:20px;background:#eee;margin-right:5px;cursor:pointer;display:inline-block}
.tag.active{background:#000;color:#fff}
textarea,input{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
.output{white-space:pre-line;line-height:1.6;font-size:15px}
</style>
</head>
<body>
<div class="container">

<h2>🚀 Generador PRO de Contenido Viral Inmobiliario</h2>

<div class="card">
<label>Tipo</label>
<input id="tipo" placeholder="Ático, piso...">
<label>Zona</label>
<input id="zona" placeholder="Valencia...">
<label>Precio</label>
<input id="precio" placeholder="340.000€">
<label>Detalle estrella</label>
<input id="detalle" placeholder="terraza, vistas...">
</div>

<div class="card">
<strong>Modo de contenido:</strong><br>
<span class="tag active" onclick="setModo('viral',this)">🔥 Viral</span>
<span class="tag" onclick="setModo('venta',this)">💰 Venta</span>
<span class="tag" onclick="setModo('marca',this)">🧠 Marca personal</span>
</div>

<div class="card">
<strong>Intensidad:</strong><br>
<span class="tag active" onclick="setNivel('suave',this)">Suave</span>
<span class="tag" onclick="setNivel('medio',this)">Medio</span>
<span class="tag" onclick="setNivel('agresivo',this)">Agresivo</span>
</div>

<div class="card">
<button class="primary" onclick="generarTodo()">🎲 Generar guión completo</button>
<button class="secondary" onclick="generarHook()">Hook</button>
<button class="secondary" onclick="generarCuerpo()">Cuerpo</button>
<button class="secondary" onclick="generarCierre()">Cierre</button>
</div>

<div class="card output" id="output">Tu guión aparecerá aquí...</div>

</div>

<script>
function v(id){return document.getElementById(id).value || `[${id}]`}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

let modo='viral'
let nivel='suave'

function setModo(m,el){modo=m;document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function setNivel(n,el){nivel=n;document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));el.classList.add('active')}

const hooks={
viral:[
()=>`"No compres en ${v('zona')} sin ver esto."`,
()=>`"Esto no debería existir por ${v('precio')}."`,
()=>`"Te están enseñando mal los pisos. Mira esto."`,
()=>`"Si estás buscando piso, esto te interesa."`
],
venta:[
()=>`"${v('tipo')} en ${v('zona')} por ${v('precio')}."`,
()=>`"Oportunidad real en ${v('zona')}."`
],
marca:[
()=>`"Después de años vendiendo pisos, pocos me sorprenden."`,
()=>`"Este es diferente. Y ahora verás por qué."`
]
}

const cuerpos={
viral:[
()=>`Nada más entrar: ${v('detalle')}. Boom.`,
()=>`Esto es lo que nadie te enseña en ${v('zona')}.`,
()=>`Aquí no compras metros. Compras estilo de vida.`
],
venta:[
()=>`${v('detalle')} que marca la diferencia.`,
()=>`Distribución pensada para vivir cómodo.`
],
marca:[
()=>`Este tipo de pisos no aparecen todos los días.`,
()=>`Se nota cuando una vivienda está bien hecha.`
]
}

const cierres={
viral:[
()=>`Esto no va a durar.`,
()=>`Guárdalo antes de que desaparezca.`
],
venta:[
()=>`Todo por ${v('precio')} en ${v('zona')}.`,
()=>`Contacta para visita.`
],
marca:[
()=>`¿Lo comprarías?`,
()=>`Te leo en comentarios.`
]
}

function generarHook(){output.innerText=pick(hooks[modo])()}
function generarCuerpo(){output.innerText=pick(cuerpos[modo])()}
function generarCierre(){output.innerText=pick(cierres[modo])()}

function generarTodo(){
let hook=pick(hooks[modo])()
let cuerpo=pick(cuerpos[modo])()
let cierre=pick(cierres[modo])()

if(nivel==='agresivo'){
hook=hook.toUpperCase()
cierre+=' 🔥'
}

if(nivel==='medio'){
cierre+='.'
}

output.innerText=`HOOK:\n${hook}\n\nCUERPO:\n${cuerpo}\n\nCIERRE:\n${cierre}`
}
</script>

</body>
</html>
