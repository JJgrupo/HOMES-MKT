<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador PRO+ Contenido Viral Inmobiliario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f4f0 0%, #ede8e3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #000 0%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e0dbd3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #000;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .toggle-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .toggle-btn:hover {
            border-color: #000;
        }

        .toggle-btn.active {
            background: #000;
            color: white;
            border-color: #000;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .btn-group {
                grid-template-columns: 1fr 1fr;
            }
        }

        button {
            padding: 12px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            border-color: #000;
            transform: translateY(-2px);
        }

        button.primary {
            background: #000;
            color: white;
            border-color: #000;
            grid-column: 1 / -1;
            padding: 14px;
            font-size: 14px;
        }

        button.primary:hover {
            background: #222;
        }

        .output-section {
            grid-column: 1 / -1;
        }

        .output-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            border: 1px solid #e0dbd3;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .output-content {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 20px;
        }

        .output-section-title {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .output-section-title:first-child {
            margin-top: 0;
        }

        .output-text {
            font-size: 15px;
            color: #222;
            margin-bottom: 16px;
            line-height: 1.7;
        }

        .copy-btn {
            align-self: flex-start;
            background: #000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #333;
        }

        .copy-btn.copied {
            background: #28a745;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #000;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .info-badge {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 12px;
        }

        .emoji {
            margin-right: 4px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #999;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #000;
            border-bottom-color: #000;
        }

        .tab-btn:hover {
            color: #000;
        }

        .hashtag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .hashtag {
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .hashtag:hover {
            background: #000;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Generador PRO+ Inmobiliario</h1>
            <p>Crea guiones virales en segundos</p>
        </div>

        <div class="grid">
            <!-- Panel de Entrada -->
            <div class="card">
                <h3>📋 Detalles de la Propiedad</h3>
                
                <div class="form-group">
                    <label>Tipo de propiedad</label>
                    <select id="tipo">
                        <option value="">Selecciona una opción</option>
                        <option value="Ático">Ático</option>
                        <option value="Piso">Piso</option>
                        <option value="Villa">Villa</option>
                        <option value="Townhouse">Townhouse</option>
                        <option value="Dúplex">Dúplex</option>
                        <option value="Chalet">Chalet</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Zona/Ciudad</label>
                    <input type="text" id="zona" placeholder="Valencia, Madrid, Barcelona...">
                </div>

                <div class="form-group">
                    <label>Precio</label>
                    <input type="text" id="precio" placeholder="340.000€, 2.500€/mes...">
                </div>

                <div class="form-group">
                    <label>Detalle estrella</label>
                    <input type="text" id="detalle" placeholder="Terraza 50m², vistas al mar...">
                </div>

                <div class="form-group">
                    <label>Características extras</label>
                    <input type="text" id="extras" placeholder="Piscina, parking, jardín...">
                </div>

                <div class="form-group">
                    <label>Metros cuadrados</label>
                    <input type="text" id="metros" placeholder="120m²">
                </div>
            </div>

            <!-- Panel de Configuración -->
            <div class="card">
                <h3>⚙️ Configuración</h3>

                <div class="form-group">
                    <label>Modo de contenido</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-mode="viral" onclick="setMode(this, 'viral')">🔥 Viral</button>
                        <button class="toggle-btn" data-mode="venta" onclick="setMode(this, 'venta')">💰 Venta</button>
                        <button class="toggle-btn" data-mode="marca" onclick="setMode(this, 'marca')">🧠 Marca</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Intensidad</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-intensity="suave" onclick="setIntensity(this, 'suave')">Suave</button>
                        <button class="toggle-btn" data-intensity="medio" onclick="setIntensity(this, 'medio')">Medio</button>
                        <button class="toggle-btn" data-intensity="agresivo" onclick="setIntensity(this, 'agresivo')">🔥 Agresivo</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Longitud</label>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-length="corto" onclick="setLength(this, 'corto')">Corto</button>
                        <button class="toggle-btn" data-length="medio" onclick="setLength(this, 'medio')">Medio</button>
                        <button class="toggle-btn" data-length="largo" onclick="setLength(this, 'largo')">Largo</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Plataforma</label>
                    <select id="plataforma">
                        <option value="tiktok">📱 TikTok</option>
                        <option value="instagram">📷 Instagram Reel</option>
                        <option value="youtube">▶️ YouTube Shorts</option>
                        <option value="linkedin">💼 LinkedIn</option>
                        <option value="twitter">𝕏 Twitter/X</option>
                    </select>
                </div>

                <div class="info-badge">
                    <span class="emoji">💡</span>Genera múltiples variaciones
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="btn-group">
                    <button class="primary" onclick="generateFull()">🎲 Guión Completo</button>
                    <button onclick="generateHook()">Hook</button>
                    <button onclick="generateBody()">Cuerpo</button>
                    <button onclick="generateClosure()">Cierre</button>
                </div>
            </div>

            <!-- Panel de Salida -->
            <div class="card output-section" style="grid-column: 1 / -1;">
                <h3>✨ Tu Contenido</h3>
                <div class="output-card">
                    <div id="output" class="empty-state">
                        Completa los detalles y genera tu primer guión
                    </div>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()" style="display: none;">
                        📋 Copiar al portapapeles
                    </button>
                </div>

                <div class="stats" id="stats" style="display: none;">
                    <div class="stat">
                        <div class="stat-value" id="statWords">0</div>
                        <div class="stat-label">Palabras</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="statChars">0</div>
                        <div class="stat-label">Caracteres</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="statSentences">0</div>
                        <div class="stat-label">Frases</div>
                    </div>
                </div>

                <div id="hashtags" style="display: none;">
                    <h4 style="margin: 20px 0 12px 0; font-size: 14px; font-weight: 600;">Hashtags sugeridos</h4>
                    <div class="hashtag-list" id="hashtagList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estado global
        let state = {
            mode: 'viral',
            intensity: 'suave',
            length: 'corto',
            platform: 'tiktok',
            lastOutput: ''
        };

        // Getters seguros
        function getInput(id) {
            const value = document.getElementById(id).value.trim();
            return value || `[${id}]`;
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Gestión de estado
        function setMode(el, mode) {
            state.mode = mode;
            document.querySelectorAll('[data-mode]').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function setIntensity(el, intensity) {
            state.intensity = intensity;
            document.querySelectorAll('[data-intensity]').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function setLength(el, length) {
            state.length = length;
            document.querySelectorAll('[data-length]').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        // Base de datos de contenido
        const content = {
            viral: {
                hooks: [
                    () => `"No compres en ${getInput('zona')} sin ver esto."`,
                    () => `"${getInput('precio')} por esto? No me lo creo."`,
                    () => `"Te están engañando con los pisos. Mira."`,
                    () => `"Si buscas casa, esto es lo que necesitas ver."`,
                    () => `"Acabo de ver algo que no esperaba."`,
                    () => `"Esto no debería costar ${getInput('precio')}."`,
                    () => `"La mayoría de agentes no te enseñan esto."`,
                    () => `"${getInput('detalle')}? Por menos de lo que crees."`
                ],
                bodies: [
                    () => `Nada más entrar: ${getInput('detalle')}. Punto.`,
                    () => `La mayoría no se fija en esto en ${getInput('zona')}.`,
                    () => `Aquí no compras metros. Compras libertad.`,
                    () => `${getInput('metros')} que parecen el doble.`,
                    () => `Distribución que solo ves en magazines.`,
                    () => `${getInput('extras')} que no esperabas por este precio.`,
                    () => `La luz natural que todos quieren.`,
                    () => `Ubicación: el verdadero lujo de esta propiedad.`
                ],
                closures: [
                    () => `Esto no va a durar 48 horas.`,
                    () => `Guárdalo antes de que desaparezca.`,
                    () => `Los que saben, ya lo vieron.`,
                    () => `¿Lo ves? Esto es lo diferente.`,
                    () => `Perfecto para quien sabe qué quiere.`,
                    () => `Esto merece una visita urgente.`
                ]
            },
            venta: {
                hooks: [
                    () => `${getInput('tipo')} en ${getInput('zona')} - ${getInput('precio')}`,
                    () => `Oportunidad en ${getInput('zona')}.`,
                    () => `${getInput('tipo')} exclusivo disponible ahora.`,
                    () => `Propiedad con carácter en ${getInput('zona')}.`,
                    () => `Tu próximo hogar te espera.`
                ],
                bodies: [
                    () => `${getInput('detalle')} que marca la diferencia.`,
                    () => `${getInput('metros')}m² perfectamente distribuidos.`,
                    () => `${getInput('extras')} incluidos en esta oportunidad.`,
                    () => `Ubicación estratégica en ${getInput('zona')}.`,
                    () => `Diseño y funcionalidad en cada rincón.`
                ],
                closures: [
                    () => `Todo por ${getInput('precio')} en ${getInput('zona')}.`,
                    () => `Contacta para visita personalizada.`,
                    () => `Disponible para ver esta semana.`,
                    () => `Hablamos del detalles en persona.`,
                    () => `Agende su visita hoy.`
                ]
            },
            marca: {
                hooks: [
                    () => `Después de ${randomInt(5, 15)} años en esto, pocos me sorprenden.`,
                    () => `Este es diferente. Y ahora entenderás por qué.`,
                    () => `Lo que busca la mayoría, lo encontré aquí.`,
                    () => `Cuando algo es excepcional, se nota al instante.`,
                    () => `Mi responsabilidad es mostrarte lo real.`
                ],
                bodies: [
                    () => `Este tipo de ${getInput('tipo').toLowerCase()} no aparecen todos los días en ${getInput('zona')}.`,
                    () => `Se nota cuando una propiedad está bien hecha.`,
                    () => `Los detalles cuentan la verdadera historia aquí.`,
                    () => `Cuando trabajas con el corazón, el resultado habla.`,
                    () => `Esto es lo que le busco a mis clientes.`
                ],
                closures: [
                    () => `¿Lo comprarías? Yo ya lo haría.`,
                    () => `Te leo en comentarios. ¿Qué opinión te merece?`,
                    () => `Este es mi estándar de calidad.`,
                    () => `Esto es lo que defiendo en el mercado.`,
                    () => `¿Nos vemos para verlo en persona?`
                ]
            }
        };

        // Generadores
        function generateHook() {
            const hooks = content[state.mode].hooks;
            let text = pick(hooks)();
            applyIntensity(text);
        }

        function generateBody() {
            const bodies = content[state.mode].bodies;
            let text = pick(bodies)();
            applyIntensity(text);
        }

        function generateClosure() {
            const closures = content[state.mode].closures;
            let text = pick(closures)();
            applyIntensity(text);
        }

        function generateFull() {
            const hooks = content[state.mode].hooks;
            const bodies = content[state.mode].bodies;
            const closures = content[state.mode].closures;

            let hook = pick(hooks)();
            let body = pick(bodies)();
            let closure = pick(closures)();

            // Generar variaciones según longitud
            if (state.length === 'medio') {
                body += `\n\n${pick(bodies)()}`;
            } else if (state.length === 'largo') {
                body += `\n\n${pick(bodies)()}\n\n${pick(bodies)()}`;
            }

            let fullText = `HOOK:\n${hook}\n\nCUERPO:\n${body}\n\nCIERRE:\n${closure}`;

            applyIntensity(fullText);
            updateStats(fullText);
            generateHashtags();
            showCopyButton();
        }

        function applyIntensity(text) {
            let result = text;

            if (state.intensity === 'medio') {
                result += '\n\n.';
            } else if (state.intensity === 'agresivo') {
                result = result.toUpperCase();
                result += '\n\n🔥 🔥 🔥';
            }

            state.lastOutput = result;
            document.getElementById('output').innerHTML = `<div class="output-content">${escapeHtml(result)}</div>`;
        }

        function generateHashtags() {
            const hashtags = {
                viral: ['#inmobiliario', '#viralrealestate', '#propiedad', '#hogar', '#mercadoinmobiliario', '#diseñodelhogar'],
                venta: ['#venta', '#propiedad', '#inmobiliario', '#nuevahogar', '#vivienda', '#oportunidad'],
                marca: ['#agenteinmobiliario', '#realtor', '#inmobiliariaprofesional', '#mercado', '#confianza', '#calidad']
            };

            const zoneHashtags = {
                'Valencia': ['#Valencia', '#CiudaddelasCiencias'],
                'Madrid': ['#Madrid', '#capitalperfecta'],
                'Barcelona': ['#Barcelona', '#destinopreferido']
            };

            let tags = hashtags[state.mode] || hashtags.viral;
            const zona = getInput('zona');

            if (zona && zona !== '[zona]') {
                tags = [...tags, ...Object.keys(zoneHashtags).filter(z => zona.includes(z)).flatMap(z => zoneHashtags[z])];
            }

            const selectedTags = tags.slice(0, 6);
            const hashtagList = document.getElementById('hashtagList');
            hashtagList.innerHTML = selectedTags.map(tag => `<span class="hashtag">${tag}</span>`).join('');
            document.getElementById('hashtags').style.display = 'block';
        }

        function updateStats(text) {
            const words = text.trim().split(/\s+/).length;
            const chars = text.length;
            const sentences = (text.match(/[.!?]/g) || []).length;

            document.getElementById('statWords').textContent = words;
            document.getElementById('statChars').textContent = chars;
            document.getElementById('statSentences').textContent = sentences;
            document.getElementById('stats').style.display = 'grid';
        }

        function showCopyButton() {
            document.getElementById('copyBtn').style.display = 'block';
        }

        function copyToClipboard() {
            const btn = document.getElementById('copyBtn');
            navigator.clipboard.writeText(state.lastOutput).then(() => {
                btn.textContent = '✅ ¡Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copiar al portapapeles';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
